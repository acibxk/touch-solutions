<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ACA Display</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 0;
}

header {
  background: #111;
  color: #fff;
  padding: 15px;
  text-align: center;
}

nav {
  background: #333;
  padding: 10px;
  text-align: center;
}

nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
}

.hero {
  padding: 60px;
  text-align: center;
  background: #f5f5f5;
}

.hero button {
  padding: 12px 20px;
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

section {
  padding: 40px;
}

#inquiry {
  background: #fafafa;
}

form {
  max-width: 500px;
  margin: auto;
  display: flex;
  flex-direction: column;
}

form input, form select, form textarea {
  margin: 8px 0;
  padding: 10px;
  font-size: 14px;
}

form button {
  padding: 12px;
  background: #28a745;
  color: white;
  border: none;
  cursor: pointer;
}

#status {
  text-align: center;
  margin-top: 10px;
  color: green;
}
</style>

</head>

<body>

<header>
  <h1>ACI Display</h1>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#inquiry">Send Inquiry</a>
</nav>

<div class="hero">
  <h2>Industrial Touch Solutions</h2>
  <p>High quality display products for global clients</p>
  <button onclick="document.getElementById('inquiry').scrollIntoView({behavior:'smooth'})">
    Get Quote
  </button>
</div>

<section>
  <h2>Our Products</h2>
  <p>Replace this section with your product content / JSON rendering</p>
</section>

<!-- Inquiry Section -->
<section id="inquiry">
  <h2 style="text-align:center;">Send Inquiry</h2>

  <form id="inquiryForm">
    <input name="name" placeholder="Full Name" required>
    <input name="email" type="email" placeholder="Email" required>
    <input name="company" placeholder="Company Name">
    <input name="country" placeholder="Country">

    <input name="product" placeholder="Product Model / Interest">

    <select name="quantity">
      <option value="">Select Quantity</option>
      <option>1-10 pcs</option>
      <option>10-100 pcs</option>
      <option>100+ pcs</option>
    </select>

    <textarea name="message" placeholder="Your Inquiry"></textarea>

    <button type="submit">Submit Inquiry</button>
  </form>

  <p id="status"></p>
</section>

<script>
document.getElementById("inquiryForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  fetch("https://script.google.com/macros/s/AKfycbx-awiDaKEKuICPCXTL8f5LBE2h3IF7EW3CdOW07G6SNlXjC0d4ulaonuZcpXhNDouslw/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    document.getElementById("status").innerText = "Inquiry sent successfully!";
    this.reset();
  })
  .catch(err => {
    document.getElementById("status").innerText = "Error, please try again.";
  });
});
</script>

</body>
</html>
